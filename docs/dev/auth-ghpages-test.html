<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Auth on GitHub Pages — Test</title>
  <style>
    body { font-family: system-ui; max-width: 540px; margin: 40px auto; padding: 20px; }
    h2 { color: #8B1E47; }
    input, button { font-size: 15px; padding: 8px 12px; margin: 4px 0; }
    input { width: 100%; box-sizing: border-box; }
    button { cursor: pointer; background: #8B1E47; color: #fff; border: none; border-radius: 4px; }
    button:disabled { opacity: .4; }
    .log { background: #f5f5f5; padding: 10px; margin: 6px 0; border-radius: 4px; font-size: 13px; white-space: pre-wrap; word-break: break-all; }
    .ok { color: green; } .err { color: red; } .warn { color: #b45309; }
    #results { margin-top: 1rem; }
  </style>
</head>
<body>
  <h2>🔐 Auth on GitHub Pages — Test</h2>
  <p style="font-size:13px;color:#666;">
    Origin: <strong id="origin"></strong><br>
    Tests whether Neon Auth cookies work cross-origin on this domain.
  </p>

  <input type="email" id="email" placeholder="email" />
  <input type="password" id="pw" placeholder="password" />
  <br><br>
  <button id="runBtn" onclick="runTests()">Run Auth Tests</button>

  <div id="results"></div>

  <script src="../js/api.js"></script>
  <script>
    document.getElementById('origin').textContent = location.origin;

    function log(msg, cls) {
      const d = document.createElement('div');
      d.className = 'log ' + (cls || '');
      d.textContent = msg;
      document.getElementById('results').appendChild(d);
    }

    async function runTests() {
      const email = document.getElementById('email').value.trim();
      const pw = document.getElementById('pw').value;
      if (!email || !pw) return alert('Enter email & password');

      document.getElementById('runBtn').disabled = true;
      document.getElementById('results').innerHTML = '';

      // 1. Sign in
      log('1️⃣ Signing in…');
      try {
        const data = await API.signIn(email, pw);
        log('✅ signIn OK — user: ' + (data.user?.email || 'unknown'), 'ok');
      } catch (e) {
        log('❌ signIn FAILED: ' + e.message, 'err');
        document.getElementById('runBtn').disabled = false;
        return;
      }

      // 2. Get session (cookie-based)
      log('2️⃣ getSession (credentials: include)…');
      let jwt = null;
      try {
        jwt = await API.getSession();
        if (jwt) {
          log('✅ JWT received (' + jwt.length + ' chars)', 'ok');
          const payload = JSON.parse(atob(jwt.split('.')[1]));
          log('   sub=' + payload.sub + '  email=' + payload.email, 'ok');
        } else {
          log('⚠️ No JWT returned — cookies likely blocked cross-origin', 'warn');
        }
      } catch (e) {
        log('❌ getSession FAILED: ' + e.message, 'err');
      }

      // 3. Data API call (needs JWT)
      log('3️⃣ GET /questions (auth required)…');
      try {
        const qs = await API.getQuestions();
        log('✅ Got ' + (qs?.length || 0) + ' questions', 'ok');
      } catch (e) {
        log('❌ getQuestions FAILED: ' + e.message, 'err');
      }

      // 4. Summary
      log('');
      if (jwt) {
        log('🎉 Auth works on this origin! Cookies are accepted cross-origin.', 'ok');
      } else {
        log('🚫 Cookies blocked. Options:\n' +
            '  a) Neon Auth custom domain (same-site cookies)\n' +
            '  b) Token-in-body flow (no cookies)\n' +
            '  c) Proxy via your own domain', 'warn');
      }

      document.getElementById('runBtn').disabled = false;
    }
  </script>
</body>
</html>
